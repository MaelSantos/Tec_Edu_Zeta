<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador - Tutor de Estudos IA</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 600px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
        #chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 8px; max-width: 80%; line-height: 1.4; }
        .user-msg { background-color: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .tutor-msg { background-color: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 0; }
        #input-area { display: flex; padding: 15px; border-top: 1px solid #ddd; background: #fff; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; outline: none; }
        #send-btn { padding: 10px 20px; margin-left: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        #send-btn:hover { background-color: #218838; }
        #send-btn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-history">
            <div class="message tutor-msg">Olá! Sou o seu tutor de estudos. O que vamos aprender hoje?</div>
        </div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Digite sua dúvida aqui..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        // URL da sua API FastAPI
        const API_URL = "http://localhost:8000/api/chat/stream";

        async function sendMessage() {
            const inputField = document.getElementById("message-input");
            const sendBtn = document.getElementById("send-btn");
            const chatHistory = document.getElementById("chat-history");
            const messageText = inputField.value.trim();

            if (!messageText) return;

            // 1. Adiciona a mensagem do usuário na tela
            appendMessage(messageText, "user-msg");
            inputField.value = "";
            sendBtn.disabled = true; // Desabilita o botão enquanto a IA responde

            // 2. Cria o balão de mensagem vazio para o tutor
            const tutorMessageDiv = appendMessage("", "tutor-msg");

            try {
                // 3. Faz a requisição POST para o FastAPI
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ prompt: messageText })
                });

                if (!response.ok) throw new Error("Erro ao conectar com a API.");

                // 4. Prepara para ler o stream de dados
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                // 5. Loop infinito que lê os pedaços (chunks) conforme chegam
                while (true) {
                    const { done, value } = await reader.read();
                    
                    if (done) break; // Sai do loop quando o stream terminar

                    // Decodifica os bytes para texto e adiciona ao balão da IA
                    const chunk = decoder.decode(value, { stream: true });
                    tutorMessageDiv.innerHTML += chunk.replace(/\n/g, "<br>"); // Substitui quebras de linha por <br>
                    
                    // Rola a tela para baixo automaticamente
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }

            } catch (error) {
                console.error("Erro:", error);
                tutorMessageDiv.innerHTML = "<i>Desculpe, ocorreu um erro ao tentar conectar com o servidor.</i>";
            } finally {
                sendBtn.disabled = false; // Reabilita o botão
                inputField.focus();
            }
        }

        // Função auxiliar para criar e injetar os balões de mensagem no HTML
        function appendMessage(text, className) {
            const chatHistory = document.getElementById("chat-history");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${className}`;
            msgDiv.innerHTML = text;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return msgDiv; // Retornamos a div para poder atualizar o texto dela (no caso do tutor)
        }

        // Permite enviar a mensagem apertando "Enter"
        document.getElementById("message-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
